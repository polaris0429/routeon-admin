<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>루트온 관리자 - 로그인</title>
  <style>
    body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; font-family: 'Malgun Gothic', sans-serif; }
    .auth-card { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 350px; text-align: center; }
    .logo-img { height: 50px; margin-bottom: 20px; }
    h2 { margin: 0 0 20px 0; color: #333; }
    input { width: 100%; box-sizing: border-box; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    input:focus { border-color: #FFE812; outline: none; }
    .btn { width: 100%; padding: 12px; background: #FFE812; color: #333; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn:hover { background: #e5cf00; }
    .link { display: block; margin-top: 15px; font-size: 14px; color: #555; text-decoration: none; }
    .link:hover { text-decoration: underline; color: #333; }
  </style>
</head>
<body>

  <div class="auth-card">
    <img src="./routeon_logo.png" alt="RouteOn Logo" class="logo-img">
    <h2>관리자 로그인</h2>
    
    <form id="loginForm">
      <input type="email" id="email" placeholder="이메일 주소" required>
      <input type="password" id="password" placeholder="비밀번호" required>
      <button type="submit" class="btn">로그인</button>
    </form>
    
    <a href="/register.html" class="link">계정이 없으신가요? 관리자 가입하기</a>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      
      const data = await res.json();
      if (data.success) {
        // 로그인 성공 시 대시보드(index.html)로 이동!
        window.location.href = '/dashboard';
      } else {
        alert(data.message);
      }
    });
  </script>
</body>
</html>
